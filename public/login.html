<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriChain - Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    
    .auth-box {
      width: 100%;
      max-width: 450px;
      padding: 2.5rem;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--border-color);
    }

    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 1rem;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-muted);
      transition: var(--transition);
    }

    .auth-tab.active {
      color: var(--primary-color);
      border-bottom: 2px solid var(--primary-color);
      margin-bottom: -2px;
    }

    .language-selector {
      position: absolute;
      top: 20px;
      right: 20px;
    }
    
    .language-selector select {
      padding: 0.5rem;
      border-radius: 8px;
      background: white;
      border: 1px solid #D1D5DB;
    }
  </style>
</head>
<body>
  <div class="language-selector">
    <select id="lang-select">
      <option value="en">English</option>
      <option value="gu">ગુજરાતી</option>
      <option value="hi">हिंदी</option>
    </select>
  </div>

  <div class="auth-container">
    <div class="glass-panel auth-box">
      <div class="auth-header">
        <h1 data-i18n="app_title">AgriChain</h1>
        <p style="color: var(--text-muted);">Supply Chain Transparency</p>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchTab('login')" data-i18n="login">Login</div>
        <div class="auth-tab" id="tab-register" onclick="switchTab('register')" data-i18n="register">Register</div>
      </div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label data-i18n="email">Email</label>
          <input type="email" id="login-email" required data-i18n="email">
        </div>
        <div class="form-group">
          <label data-i18n="password">Password</label>
          <div style="position: relative;">
            <input type="password" id="login-password" required data-i18n="password" style="width: 100%;">
            <button type="button" onclick="togglePassword('login-password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem;">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%" data-i18n="login">Login</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="hidden">
        <div class="form-group">
          <label data-i18n="name">Full Name</label>
          <input type="text" id="reg-name" required data-i18n="name">
        </div>
        <div class="form-group">
          <label data-i18n="email">Email</label>
          <input type="email" id="reg-email" required data-i18n="email">
        </div>
        <div class="form-group">
          <label data-i18n="password">Password</label>
          <div style="position: relative;">
            <input type="password" id="reg-password" required data-i18n="password" pattern="(?=.*[A-Z])(?=.*[!@#$&*]).{8,}" title="Minimum 8 characters, at least 1 Uppercase letter and 1 Symbol (!@#$&*)" placeholder="e.g. Secret@123" style="width: 100%;">
            <button type="button" onclick="togglePassword('reg-password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem;">👁️</button>
          </div>
        </div>
        <div class="form-group">
          <label data-i18n="role">Role</label>
          <select id="reg-role" required onchange="toggleAadhaarField()">
            <option value="" disabled selected data-i18n="role">Select Role</option>
            <option value="farmer" data-i18n="farmer">Farmer</option>
            <option value="retailer" data-i18n="retailer">Retailer</option>
            <option value="customer" data-i18n="customer">Customer</option>
          </select>
        </div>
        <div class="form-group hidden" id="aadhaar-group">
          <label>Aadhaar Card Number (12 Digits) <span style="color:var(--primary-color);">*</span></label>
          <input type="text" id="reg-aadhaar" pattern="[0-9]{12}" title="Must be exactly 12 digits" placeholder="e.g. 123456789012">
        </div>
        <div class="form-group">
          <label>Mobile Number (Private)</label>
          <input type="tel" id="reg-mobile" pattern="[0-9]{10,12}" title="Enter a valid 10-12 digit mobile number" required placeholder="e.g. 9876543210">
        </div>
        <div class="form-group">
          <label data-i18n="location">Gujarat District</label>
          <select id="reg-location" required>
            <option value="" disabled selected>Select District</option>
            <option value="Ahmedabad">Ahmedabad</option>
            <option value="Amreli">Amreli</option>
            <option value="Anand">Anand</option>
            <option value="Aravalli">Aravalli</option>
            <option value="Banaskantha">Banaskantha</option>
            <option value="Bharuch">Bharuch</option>
            <option value="Bhavnagar">Bhavnagar</option>
            <option value="Botad">Botad</option>
            <option value="Chhota Udaipur">Chhota Udaipur</option>
            <option value="Dahod">Dahod</option>
            <option value="Dang">Dang</option>
            <option value="Devbhoomi Dwarka">Devbhoomi Dwarka</option>
            <option value="Gandhinagar">Gandhinagar</option>
            <option value="Gir Somnath">Gir Somnath</option>
            <option value="Jamnagar">Jamnagar</option>
            <option value="Junagadh">Junagadh</option>
            <option value="Kheda">Kheda</option>
            <option value="Kutch">Kutch</option>
            <option value="Mahisagar">Mahisagar</option>
            <option value="Mehsana">Mehsana</option>
            <option value="Morbi">Morbi</option>
            <option value="Narmada">Narmada</option>
            <option value="Navsari">Navsari</option>
            <option value="Panchmahal">Panchmahal</option>
            <option value="Patan">Patan</option>
            <option value="Porbandar">Porbandar</option>
            <option value="Rajkot">Rajkot</option>
            <option value="Sabarkantha">Sabarkantha</option>
            <option value="Surat">Surat</option>
            <option value="Surendranagar">Surendranagar</option>
            <option value="Tapi">Tapi</option>
            <option value="Vadodara">Vadodara</option>
            <option value="Valsad">Valsad</option>
          </select>
        </div>
        <div class="form-group">
          <label>Specific Delivery Address</label>
          <textarea id="reg-address" required rows="2" placeholder="House/Farm/Shop No., Street Name, Landmark" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); font-family: inherit; font-size: 0.9rem; margin-top: 0.25rem;"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%" data-i18n="register">Register</button>
      </form>

      <div style="margin-top: 1.5rem; text-align: center;">
        <button type="button" class="btn btn-secondary" style="width: 100%; border: 1px solid var(--border-color);" onclick="showMobileQR()">📱 Open App on Mobile Phone</button>
      </div>
    </div>
  </div>

  <!-- Mobile Access Modal -->
  <div id="mobile-qr-modal" class="modal-overlay hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; display: flex;">
    <div class="modal" style="background: white; padding: 2rem; border-radius: 12px; text-align: center; max-width: 350px; position: relative;">
      <button onclick="closeMobileQR()" style="position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
      <h3 style="color: var(--primary-color); margin-bottom: 0.5rem;" data-i18n="app_title">AgriChain Mobile</h3>
      <p style="font-size: 0.9rem; color: var(--text-muted);">Ensure your phone is connected to the same Wi-Fi as your laptop</p>
      <div id="mobile-qr-container" style="margin: 1rem 0;"></div>
      <p style="font-size: 0.8rem; color: var(--primary-hover); word-break: break-all;" id="mobile-qr-url"></p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    function switchTab(tab) {
      document.getElementById('tab-login').classList.remove('active');
      document.getElementById('tab-register').classList.remove('active');
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('register-form').classList.add('hidden');

      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById(tab + '-form').classList.remove('hidden');
    }

    async function showMobileQR() {
      try {
        const res = await fetch('/api/mobile-qr');
        const data = await res.json();
        document.getElementById('mobile-qr-container').innerHTML = `<img src="${data.qrCode}" alt="Mobile QR">`;
        document.getElementById('mobile-qr-url').textContent = data.url;
        
        // Use standard display block instead of overriding flex from class
        const modal = document.getElementById('mobile-qr-modal');
        modal.classList.remove('hidden');
      } catch(e) {}
    }

    function closeMobileQR() {
      document.getElementById('mobile-qr-modal').classList.add('hidden');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          if (data.user.language) setLanguage(data.user.language);
          window.location.href = '/index.html';
        } else {
          showToast(data.error, true);
        }
      } catch (err) {
        showToast('Server error', true);
      }
    });

    function togglePassword(id) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
      } else {
        input.type = 'password';
      }
    }

    function toggleAadhaarField() {
      const role = document.getElementById('reg-role').value;
      const aadhaarGroup = document.getElementById('aadhaar-group');
      const aadhaarInput = document.getElementById('reg-aadhaar');
      if (role === 'farmer') {
        aadhaarGroup.classList.remove('hidden');
        aadhaarInput.required = true;
      } else {
        aadhaarGroup.classList.add('hidden');
        aadhaarInput.required = false;
        aadhaarInput.value = '';
      }
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const role = document.getElementById('reg-role').value;
      const location = document.getElementById('reg-location').value;
      const mobile = document.getElementById('reg-mobile').value;
      const address = document.getElementById('reg-address').value;
      const aadhaar_number = document.getElementById('reg-aadhaar').value;

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role, location, mobile, address, aadhaar_number })
        });
        const data = await res.json();
        if (res.ok) {
          showToast('Registration successful! Please login.');
          switchTab('login');
        } else {
          showToast(data.error, true);
        }
      } catch (err) {
        showToast('Server error', true);
      }
    });
    
    // Check if logged in. If logged in, redirect to index
    fetch('/api/me').then(res => res.json()).then(data => {
      if(data.user) window.location.href = '/index.html';
    }).catch(()=>{});
  </script>
</body>
</html>
