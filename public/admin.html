<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriChain - Database Viewer</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --panel-bg: #1e293b;
      --text-color: #f8fafc;
      --border-color: #334155;
      --primary-color: #3b82f6;
      --header-bg: #0f172a;
    }
    body {
      font-family: 'Consolas', 'Courier New', monospace;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: var(--primary-color);
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .db-section {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 30px;
      overflow-x: auto;
    }
    .db-section h2 {
      margin-top: 0;
      color: #cbd5e1;
      font-size: 1.2rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    th {
      background-color: var(--header-bg);
      color: #94a3b8;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    tr:hover {
      background-color: #2dd4bf20;
    }
    .null-val {
      color: #64748b;
      font-style: italic;
    }
    .btn-refresh {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      float: right;
    }
    .btn-refresh:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>

  <h1>🗄️ AgriChain Database Management System
    <button class="btn-refresh" onclick="loadAllData()">🔄 Refresh Database</button>
  </h1>

  <div class="db-section">
    <h2>TABLE: users</h2>
    <table id="table-users">
      <thead>
        <tr>
          <th>id</th><th>name</th><th>email</th><th>role</th><th>mobile</th><th>aadhaar</th><th>is_verified</th><th>location</th><th>created_at</th>
        </tr>
      </thead>
      <tbody><tr><td colspan="9">Loading...</td></tr></tbody>
    </table>
  </div>

  <div class="db-section">
    <h2>TABLE: products</h2>
    <table id="table-products">
      <thead>
        <tr>
          <th>id</th><th>product_id</th><th>name</th><th>farmer_id</th><th>price</th><th>qty</th><th>certification</th><th>status</th>
        </tr>
      </thead>
      <tbody><tr><td colspan="8">Loading...</td></tr></tbody>
    </table>
  </div>

  <div class="db-section">
    <h2>TABLE: orders</h2>
    <table id="table-orders">
      <thead>
        <tr>
          <th>id</th><th>product_id</th><th>buyer_id</th><th>qty</th><th>total_price</th><th>status</th><th>created_at</th>
        </tr>
      </thead>
      <tbody><tr><td colspan="7">Loading...</td></tr></tbody>
    </table>
  </div>

  <script>
    async function fetchData(endpoint, tableId, columns) {
      const tbody = document.querySelector(`#${tableId} tbody`);
      try {
        const res = await fetch(endpoint);
        const data = await res.json();
        
        if (data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="${columns.length}">0 rows returned</td></tr>`;
          return;
        }

        tbody.innerHTML = '';
        data.forEach(row => {
          const tr = document.createElement('tr');
          columns.forEach(col => {
            const td = document.createElement('td');
            let val = row[col];
            if (val === null || val === undefined || val === '') {
              td.innerHTML = '<span class="null-val">NULL</span>';
            } else {
              // Truncate long strings for clean UI
              if (typeof val === 'string' && val.length > 30) val = val.substring(0, 30) + '...';
              td.textContent = val;
            }
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="${columns.length}" style="color:red">Error fetching data</td></tr>`;
      }
    }

    function loadAllData() {
      fetchData('/api/debug/users', 'table-users', ['id', 'name', 'email', 'role', 'mobile', 'aadhaar_number', 'is_aadhaar_verified', 'location', 'created_at']);
      fetchData('/api/debug/products', 'table-products', ['id', 'product_id', 'name', 'farmer_id', 'farm_price', 'quantity', 'certification', 'status']);
      fetchData('/api/debug/orders', 'table-orders', ['id', 'product_id', 'buyer_id', 'quantity', 'total_price', 'status', 'created_at']);
    }

    // Auto-load on page load
    window.onload = loadAllData;
  </script>
</body>
</html>
